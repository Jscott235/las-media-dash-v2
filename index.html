<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAS Media OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07071a;
  --surface:rgba(255,255,255,0.04);
  --surface-h:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border-h:rgba(255,255,255,0.15);
  --text:#eeeeff;
  --muted:rgba(220,220,255,0.5);
  --dim:rgba(220,220,255,0.22);
  --accent:#6366f1;
  --accent2:#8b5cf6;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --cyan:#22d3ee;
  --r:14px;
  --rs:8px;
  --sw:220px;
  --ease:cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
select,input,textarea{font-family:'Inter',sans-serif;color:var(--text);}
select option{background:#0f0f28;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
.login-box{width:100%;max-width:360px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:2.5rem;backdrop-filter:blur(40px);}
.login-logo{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:1.75rem;display:flex;align-items:center;gap:.6rem;}
.login-logo span{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#fff;}
.login-field{margin-bottom:1rem;}
.login-field label{display:block;font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;letter-spacing:.05em;}
.login-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--rs);padding:.65rem .9rem;color:var(--text);font-size:.85rem;outline:none;transition:border-color .15s;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;margin-top:.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--rs);padding:.75rem;color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
.login-btn:hover{opacity:.9;}
.login-err{font-size:.72rem;color:var(--red);margin-top:.75rem;text-align:center;min-height:1rem;}

/* ── APP LAYOUT ── */
#app{display:none;height:100vh;flex-direction:row;}
#app.visible{display:flex;}
.sidebar{width:var(--sw);flex-shrink:0;background:#0d0d24;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
.main{flex:1;overflow-y:auto;height:100vh;}

/* ── SIDEBAR ── */
.sb-head{padding:1.25rem 1.1rem 1rem;border-bottom:1px solid var(--border);}
.sb-brand{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);}
.sb-sub{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:.15rem;}
.sb-nav{padding:.5rem .65rem;flex:1;}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.6rem .75rem;border-radius:var(--rs);cursor:pointer;transition:all .15s;margin-bottom:.15rem;}
.nav-item:hover{background:var(--surface-h);}
.nav-item.active{background:rgba(99,102,241,0.12);}
.nav-item.active .nav-icon{color:var(--accent);}
.nav-icon{font-size:.85rem;width:18px;text-align:center;color:var(--dim);flex-shrink:0;}
.nav-label{font-size:.78rem;font-weight:500;color:var(--muted);}
.nav-item.active .nav-label{color:var(--text);}
.sb-footer{padding:1rem 1.1rem;border-top:1px solid var(--border);}
.signout{font-size:.7rem;color:var(--dim);cursor:pointer;transition:color .15s;}
.signout:hover{color:var(--red);}

/* ── SECTION ── */
.section{display:none;padding:2rem;min-height:100%;}
.section.active{display:block;}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:-.02em;}

/* ── SECTION BLOCKS ── */
.sec-block{margin-top:1.75rem;}
.sec-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.sec-block-title{font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:var(--rs);font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;}
.btn:hover{border-color:var(--border-h);color:var(--text);background:var(--surface-h);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;}
.btn-primary:hover{opacity:.9;color:#fff;}
.btn-green{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:var(--green);}
.btn-green:hover{background:rgba(16,185,129,0.2);}
.btn-red{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:var(--red);}
.btn-red:hover{background:rgba(239,68,68,0.18);}
.btn-amber{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25);color:var(--amber);}
.btn-amber:hover{background:rgba(245,158,11,0.18);}
.btn-sm{padding:.35rem .7rem;font-size:.7rem;}

/* ── INPUTS ── */
.field{margin-bottom:.9rem;}
.field label{display:block;font-size:.68rem;font-weight:600;color:var(--muted);margin-bottom:.35rem;letter-spacing:.04em;}
.input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--rs);padding:.6rem .85rem;color:var(--text);font-size:.82rem;outline:none;transition:border-color .15s;}
.input:focus{border-color:var(--accent);}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
textarea.input{resize:vertical;min-height:80px;}
select.input{cursor:pointer;background:#0d0d24;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:#0f0f28;border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:.6rem;margin-top:1.25rem;}

/* ── SCANNER ── */
.scanner-row{display:flex;gap:.6rem;margin-bottom:.85rem;}
.scanner-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--rs);padding:.6rem .9rem;color:var(--text);font-size:.82rem;outline:none;}
.scanner-input:focus{border-color:var(--accent);}
.scan-result{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:.4rem;}
.scan-result-info{}
.scan-result-name{font-size:.82rem;font-weight:600;color:var(--text);}
.scan-result-meta{font-size:.68rem;color:var(--muted);margin-top:.15rem;}
.scan-notice{font-size:.75rem;color:var(--dim);padding:.75rem;text-align:center;}

/* ── LEAD CARDS ── */
.leads-list{display:flex;flex-direction:column;gap:.6rem;}
.lead-card{background:#0d0d24;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s;}
.lead-card:hover{border-color:var(--border-h);}
.lead-card.open{border-color:rgba(99,102,241,0.3);}
.lead-card-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.1rem;cursor:pointer;user-select:none;}
.lead-card-left{}
.lead-name{font-size:.92rem;font-weight:700;color:var(--text);}
.lead-meta{font-size:.68rem;color:var(--muted);margin-top:.15rem;}
.lead-card-right{display:flex;align-items:center;gap:.65rem;flex-shrink:0;}
.stage-pill{font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.22rem .6rem;border-radius:99px;}
.stage-pill.research{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:var(--amber);}
.stage-pill.cold_call{background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;}
.stage-pill.follow_up{background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.2);color:var(--cyan);}
.stage-pill.shoot_booked{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:var(--green);}
.stage-pill.lost{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red);}
.stage-pill.try_later{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--dim);}
.lead-chevron{color:var(--dim);font-size:.7rem;transition:transform .2s;}
.lead-card.open .lead-chevron{transform:rotate(180deg);}
.lead-card-body{display:none;border-top:1px solid var(--border);}
.lead-card.open .lead-card-body{display:block;}

/* ── PIPELINE INSIDE CARD ── */
.pipeline-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.pipeline-tab{padding:.65rem 1.1rem;font-size:.7rem;font-weight:600;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;}
.pipeline-tab:hover{color:var(--muted);}
.pipeline-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.pipeline-panel{display:none;padding:1.1rem;}
.pipeline-panel.active{display:block;}

/* ── SOCIAL RATING ── */
.social-platform{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.social-platform:last-child{border-bottom:none;}
.social-name{font-size:.78rem;font-weight:500;color:var(--muted);}
.social-input{font-size:.72rem;color:var(--dim);}
.rating-btns{display:flex;gap:.35rem;}
.rating-btn{padding:.25rem .6rem;border-radius:99px;border:1px solid var(--border);background:none;font-size:.65rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--dim);}
.rating-btn.good.active{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--green);}
.rating-btn.ok.active{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.35);color:var(--amber);}
.rating-btn.bad.active{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red);}
.rating-btn:hover{border-color:var(--border-h);color:var(--text);}
.social-url-input{width:160px;background:transparent;border:1px solid var(--border);border-radius:5px;padding:.2rem .5rem;font-size:.65rem;color:var(--muted);outline:none;}
.social-url-input:focus{border-color:var(--accent);}

/* ── PITCH PANEL ── */
.pitch-textarea{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:var(--rs);padding:.85rem;color:var(--text);font-size:.82rem;line-height:1.65;min-height:140px;resize:vertical;outline:none;}
.pitch-textarea:focus{border-color:var(--accent);}
.panel-label{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:.5rem;}
.call-log-entry{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--rs);padding:.7rem .9rem;margin-bottom:.4rem;}
.call-log-date{font-size:.65rem;color:var(--dim);margin-bottom:.3rem;}
.call-log-outcome{font-size:.72rem;font-weight:600;color:var(--muted);}
.call-log-notes{font-size:.72rem;color:var(--dim);margin-top:.2rem;}

/* ── FOLLOW UP PANEL ── */
.followup-options{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}

/* ── CALL OVERLAY ── */
#callOverlay{display:none;position:fixed;inset:0;background:#07071a;z-index:500;flex-direction:column;}
#callOverlay.open{display:flex;}
.call-overlay-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.call-overlay-business{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;}
.call-pitch{flex:1;overflow-y:auto;padding:1.5rem;font-size:1rem;line-height:1.9;color:var(--text);white-space:pre-wrap;}
.call-objections{flex-shrink:0;border-top:1px solid var(--border);padding:1rem 1.5rem;}
.call-objections-label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:.65rem;}
.obj-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.85rem;}
.obj-btn{padding:.4rem .85rem;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;}
.obj-btn:hover,.obj-btn.active{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.3);color:var(--text);}
.obj-response{background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);border-radius:var(--rs);padding:.85rem;font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:.85rem;display:none;}
.call-outcomes{display:flex;gap:.6rem;flex-wrap:wrap;}

/* ── EMPTY STATE ── */
.empty{font-size:.78rem;color:var(--dim);padding:2rem;text-align:center;border:1px dashed rgba(255,255,255,0.07);border-radius:var(--r);}

/* ── MOBILE ── */
.mob-bar{display:none;align-items:center;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);}
.mob-menu{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.25rem;}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:98;}
.sb-backdrop.open{display:block;}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:99;transform:translateX(-100%);transition:transform .22s var(--ease);}
  .sidebar.open{transform:translateX(0);}
  .main{width:100%;}
  .mob-bar{display:flex;}
  .section{padding:1rem;}
  .input-row{grid-template-columns:1fr;}
  .followup-options{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><span>L</span> LAS Media OS</div>
    <div class="login-field"><label>Email</label><input class="login-input" id="loginEmail" type="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-field"><label>Password</label><input class="login-input" id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADD LEAD MODAL -->
<div class="modal-overlay" id="addLeadModal">
  <div class="modal">
    <div class="modal-title">Add Lead</div>
    <div class="input-row">
      <div class="field"><label>Business Name *</label><input class="input" id="al-name" placeholder="e.g. Café Mood"></div>
      <div class="field"><label>Business Type</label><input class="input" id="al-type" placeholder="e.g. Restaurant"></div>
    </div>
    <div class="input-row">
      <div class="field"><label>Location</label><input class="input" id="al-location" placeholder="e.g. Hartlepool"></div>
      <div class="field"><label>Phone</label><input class="input" id="al-phone" placeholder="07700 000000" type="tel"></div>
    </div>
    <div class="field"><label>Website</label><input class="input" id="al-website" placeholder="https://"></div>
    <div class="input-row">
      <div class="field"><label>Instagram</label><input class="input" id="al-instagram" placeholder="@handle"></div>
      <div class="field"><label>TikTok</label><input class="input" id="al-tiktok" placeholder="@handle"></div>
    </div>
    <div class="input-row">
      <div class="field"><label>Facebook</label><input class="input" id="al-facebook" placeholder="Page name or URL"></div>
      <div class="field"><label>YouTube</label><input class="input" id="al-youtube" placeholder="Channel name or URL"></div>
    </div>
    <div class="field"><label>Notes</label><textarea class="input" id="al-notes" placeholder="Anything worth knowing..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveNewLead()">Add Lead</button>
      <button class="btn" onclick="closeModal('addLeadModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- FOLLOW UP MODAL -->
<div class="modal-overlay" id="followUpModal">
  <div class="modal">
    <div class="modal-title" id="fuModalTitle">Schedule Follow Up</div>
    <div id="fuModalBody"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('followUpModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- BOOK SHOOT MODAL -->
<div class="modal-overlay" id="bookShootModal">
  <div class="modal">
    <div class="modal-title">Book a Shoot</div>
    <div class="field"><label>Date</label><input class="input" id="bs-date" type="date"></div>
    <div class="field"><label>Time</label><input class="input" id="bs-time" type="time" value="10:00"></div>
    <div class="field"><label>Location / Notes</label><textarea class="input" id="bs-notes" placeholder="Shoot location, what to bring, etc."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="confirmBookShoot()">Confirm Shoot</button>
      <button class="btn" onclick="closeModal('bookShootModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- CALL OVERLAY -->
<div id="callOverlay">
  <div class="call-overlay-head">
    <div>
      <div class="call-overlay-business" id="callBizName"></div>
      <div style="font-size:.65rem;color:var(--dim);margin-top:.15rem;" id="callBizMeta"></div>
    </div>
    <button class="btn btn-sm" onclick="closeCallOverlay()">✕ End Call</button>
  </div>
  <div class="call-pitch" id="callPitchText"></div>
  <div class="call-objections">
    <div class="call-objections-label">Objection Handling — tap if they say:</div>
    <div class="obj-btns">
      <button class="obj-btn" onclick="showObjResponse(this,'already_someone')">Already have someone</button>
      <button class="obj-btn" onclick="showObjResponse(this,'no_budget')">No budget</button>
      <button class="obj-btn" onclick="showObjResponse(this,'not_interested')">Not interested</button>
      <button class="obj-btn" onclick="showObjResponse(this,'too_busy')">Too busy</button>
      <button class="obj-btn" onclick="showObjResponse(this,'call_back')">Call back later</button>
      <button class="obj-btn" onclick="showObjResponse(this,'send_info')">Send info first</button>
    </div>
    <div class="obj-response" id="objResponse"></div>
    <div class="call-outcomes">
      <button class="btn btn-green" onclick="callOutcome('shoot')">📅 Book Shoot</button>
      <button class="btn btn-amber" onclick="callOutcome('follow_up')">📲 Follow Up</button>
      <button class="btn btn-red" onclick="callOutcome('lost')">✕ Not Interested</button>
      <button class="btn" onclick="callOutcome('try_later')">🕐 Try Again Later</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sb-backdrop" id="sbBackdrop" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-brand">LAS Media</div>
      <div class="sb-sub">Business OS</div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-footer">
      <div class="signout" onclick="doLogout()">Sign out</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="mob-bar">
      <button class="mob-menu" onclick="openSidebar()">☰</button>
    </div>

    <!-- HOME -->
    <div class="section" id="sec-home">
      <div class="section-title">Home</div>
    </div>

    <!-- OUTREACH -->
    <div class="section" id="sec-outreach">
      <div class="section-title">Outreach</div>

      <!-- FIND LEADS -->
      <div class="sec-block">
        <div class="sec-block-header">
          <div class="sec-block-title">Find Leads</div>
          <button class="btn btn-primary btn-sm" onclick="openModal('addLeadModal')">+ Add Manually</button>
        </div>
        <!-- Maps Scanner -->
        <div class="scanner-row">
          <input class="scanner-input" id="scanQuery" placeholder="e.g. 'restaurants Hartlepool' · 'barbers Stockton'" onkeydown="if(event.key==='Enter')runScanner()">
          <button class="btn btn-primary" onclick="runScanner()">Scan Maps</button>
        </div>
        <div style="font-size:.65rem;color:var(--dim);margin-bottom:.75rem;" id="mapsKeyNotice">
          <span>Google Maps API key: </span>
          <input id="mapsKeyInput" placeholder="Paste key here" style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--muted);font-size:.65rem;outline:none;width:200px;padding:.1rem .2rem;" onchange="saveMapsKey(this.value)">
        </div>
        <div id="scanResults"><div class="scan-notice">Enter a search above to find local businesses.</div></div>

</div>

<script>
// ─────────────────────────────────────────
// SUPABASE
// ─────────────────────────────────────────
const SUPABASE_URL  = 'https://zwndffsorkqsjykauepp.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3bmRmZnNvcmtxc2p5a2F1ZXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzY4NDUsImV4cCI6MjA5ODExMjg0NX0.07KfE2A_sxEfGq1oPnEFvTihs0o54ZuTHG7DuMls7g0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ─────────────────────────────────────────
// NAV
// ─────────────────────────────────────────
const NAV = [
  { id: 'home',     label: 'Home',     icon: '⌂' },
  { id: 'outreach', label: 'Outreach', icon: '📞' },
];
let activeSection = null;

function buildNav() {
  document.getElementById('sbNav').innerHTML = NAV.map(n =>
    `<div class="nav-item" id="nav-${n.id}" onclick="showSection('${n.id}')">
      <span class="nav-icon">${n.icon}</span>
      <span class="nav-label">${n.label}</span>
    </div>`).join('');
}

function showSection(id) {
  if (activeSection) {
    document.getElementById('sec-' + activeSection)?.classList.remove('active');
    document.getElementById('nav-' + activeSection)?.classList.remove('active');
  }
  activeSection = id;
  document.getElementById('sec-' + id)?.classList.add('active');
  document.getElementById('nav-' + id)?.classList.add('active');
  closeSidebar();
  if (id === 'outreach') renderLeads();
}

// ─────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sbBackdrop').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbBackdrop').classList.remove('open'); }

// ─────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ─────────────────────────────────────────
// LEADS — localStorage
// ─────────────────────────────────────────
const LEADS_KEY = 'las_v2_leads';

function getLeads() {
  try { return JSON.parse(localStorage.getItem(LEADS_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveLeads(leads) { localStorage.setItem(LEADS_KEY, JSON.stringify(leads)); }
function getLead(id) { return getLeads().find(l => l.id === id); }
function updateLead(id, updates) {
  const leads = getLeads();
  const i = leads.findIndex(l => l.id === id);
  if (i > -1) { leads[i] = { ...leads[i], ...updates }; saveLeads(leads); }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function saveNewLead() {
  const name = document.getElementById('al-name').value.trim();
  if (!name) { alert('Business name is required.'); return; }
  const lead = {
    id: uid(),
    name,
    type: document.getElementById('al-type').value.trim(),
    location: document.getElementById('al-location').value.trim(),
    phone: document.getElementById('al-phone').value.trim(),
    website: document.getElementById('al-website').value.trim(),
    instagram: document.getElementById('al-instagram').value.trim(),
    tiktok: document.getElementById('al-tiktok').value.trim(),
    facebook: document.getElementById('al-facebook').value.trim(),
    youtube: document.getElementById('al-youtube').value.trim(),
    notes: document.getElementById('al-notes').value.trim(),
    stage: 'research',
    socialRating: {},
    pitch: '',
    callLogs: [],
    followUpDate: null,
    shootDate: null,
    addedAt: new Date().toISOString(),
  };
  const leads = getLeads();
  leads.unshift(lead);
  saveLeads(leads);
  // Clear form
  ['al-name','al-type','al-location','al-phone','al-website','al-instagram','al-tiktok','al-facebook','al-youtube','al-notes']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  closeModal('addLeadModal');
  renderLeads();
}

// ─────────────────────────────────────────
// RENDER LEADS
// ─────────────────────────────────────────
const STAGE_LABELS = {
  research: 'Research',
  cold_call: 'Cold Call',
  follow_up: 'Follow Up',
  shoot_booked: 'Shoot Booked',
  portfolio: 'Portfolio',
  lost: 'Lost',
  try_later: 'Try Later',
};

function renderLeads() {
  const leads = getLeads();
  const list = document.getElementById('leadsList');
  const count = document.getElementById('leadCount');
  if (count) count.textContent = leads.length + ' lead' + (leads.length !== 1 ? 's' : '');
  if (!leads.length) {
    list.innerHTML = '<div class="empty">No leads yet. Add one manually or scan Google Maps above.</div>';
    return;
  }
  list.innerHTML = leads.map(l => leadCardHTML(l)).join('');
}

function leadCardHTML(l) {
  const stageClass = l.stage || 'research';
  const stageLabel = STAGE_LABELS[stageClass] || stageClass;
  return `
  <div class="lead-card" id="lc-${l.id}">
    <div class="lead-card-head" onclick="toggleCard('${l.id}')">
      <div class="lead-card-left">
        <div class="lead-name">${esc(l.name)}</div>
        <div class="lead-meta">${[l.type, l.location].filter(Boolean).join(' · ') || 'No details yet'}</div>
      </div>
      <div class="lead-card-right">
        <span class="stage-pill ${stageClass}">${stageLabel}</span>
        <span class="lead-chevron">▾</span>
      </div>
    </div>
    <div class="lead-card-body">
      <div class="pipeline-tabs">
        <div class="pipeline-tab active" onclick="switchTab('${l.id}','research',this)">Research</div>
        <div class="pipeline-tab" onclick="switchTab('${l.id}','coldcall',this)">Cold Call</div>
        <div class="pipeline-tab" onclick="switchTab('${l.id}','followup',this)">Follow Up</div>
        <div class="pipeline-tab" onclick="switchTab('${l.id}','actions',this)">Actions</div>
      </div>

      <!-- RESEARCH -->
      <div class="pipeline-panel active" id="panel-${l.id}-research">
        <div class="panel-label" style="margin-bottom:.85rem;">Rate their social media presence</div>
        ${['Instagram','TikTok','Facebook','YouTube'].map(p => {
          const key = p.toLowerCase();
          const url = l[key] || '';
          const rating = l.socialRating?.[key] || '';
          return `<div class="social-platform">
            <div>
              <div class="social-name">${p}</div>
              <input class="social-url-input" placeholder="URL or @handle" value="${esc(url)}"
                onchange="updateSocialUrl('${l.id}','${key}',this.value)" onclick="event.stopPropagation()">
            </div>
            <div class="rating-btns">
              <button class="rating-btn good${rating==='good'?' active':''}" onclick="setRating('${l.id}','${key}','good',this)">Good</button>
              <button class="rating-btn ok${rating==='ok'?' active':''}" onclick="setRating('${l.id}','${key}','ok',this)">OK</button>
              <button class="rating-btn bad${rating==='bad'?' active':''}" onclick="setRating('${l.id}','${key}','bad',this)">Bad</button>
            </div>
          </div>`;
        }).join('')}
        <div style="margin-top:1rem;">
          <button class="btn btn-primary btn-sm" onclick="advanceToCall('${l.id}')">Ready to call →</button>
        </div>
      </div>

      <!-- COLD CALL -->
      <div class="pipeline-panel" id="panel-${l.id}-coldcall">
        <div class="panel-label">Saved Pitch</div>
        <textarea class="pitch-textarea" id="pitch-${l.id}" placeholder="Generate a pitch below, paste the result here, then save it.">${esc(l.pitch || '')}</textarea>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.65rem;margin-bottom:1rem;">
          <button class="btn btn-primary btn-sm" onclick="generatePitchPrompt('${l.id}')">✦ Generate Pitch Prompt</button>
          <button class="btn btn-sm" onclick="savePitch('${l.id}')">Save Pitch</button>
          <button class="btn btn-green btn-sm" onclick="openCallOverlay('${l.id}')">📞 Log Call</button>
        </div>
        <div class="panel-label">Call Log</div>
        <div id="calllog-${l.id}">
          ${(l.callLogs||[]).length ? l.callLogs.map(c => `
            <div class="call-log-entry">
              <div class="call-log-date">${new Date(c.date).toLocaleString('en-GB')}</div>
              <div class="call-log-outcome">Outcome: ${c.outcome||'—'}</div>
              ${c.objections?.length ? `<div class="call-log-notes">Objections: ${c.objections.join(', ')}</div>` : ''}
              ${c.notes ? `<div class="call-log-notes">${esc(c.notes)}</div>` : ''}
            </div>`) .join('') : '<div style="font-size:.72rem;color:var(--dim);">No calls logged yet.</div>'}
        </div>
      </div>

      <!-- FOLLOW UP -->
      <div class="pipeline-panel" id="panel-${l.id}-followup">
        ${l.followUpDate ? `<div style="font-size:.78rem;color:var(--amber);margin-bottom:.85rem;">⏰ Scheduled: ${new Date(l.followUpDate).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</div>` : ''}
        ${l.shootDate ? `<div style="font-size:.78rem;color:var(--green);margin-bottom:.85rem;">📅 Shoot: ${new Date(l.shootDate).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>` : ''}
        <div class="followup-options">
          <button class="btn btn-green" onclick="openBookShoot('${l.id}')">📅 Book Shoot</button>
          <button class="btn btn-amber" onclick="openFollowUp('${l.id}','whatsapp')">💬 WhatsApp Follow Up</button>
          <button class="btn" onclick="openFollowUp('${l.id}','callback')">📞 Schedule Callback</button>
          <button class="btn btn-red" onclick="moveLead('${l.id}','lost')">✕ Mark as Lost</button>
          <button class="btn" onclick="openFollowUp('${l.id}','try_later')">🕐 Try Again in a Few Months</button>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="pipeline-panel" id="panel-${l.id}-actions">
        <div style="display:flex;flex-direction:column;gap:.5rem;">
          <button class="btn btn-sm" onclick="editLead('${l.id}')">✏️ Edit Details</button>
          <button class="btn btn-red btn-sm" onclick="deleteLead('${l.id}')">🗑 Delete Lead</button>
        </div>
        <div style="margin-top:1rem;">
          <div class="panel-label">Move to Stage</div>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem;">
            ${Object.entries(STAGE_LABELS).map(([k,v]) =>
              `<button class="btn btn-sm${l.stage===k?' btn-primary':''}" onclick="moveLead('${l.id}','${k}')">${v}</button>`
            ).join('')}
          </div>
        </div>
      </div>

    </div>
  </div>`;
}

function toggleCard(id) {
  const card = document.getElementById('lc-' + id);
  if (card) card.classList.toggle('open');
}

function switchTab(leadId, tabId, el) {
  const card = document.getElementById('lc-' + leadId);
  if (!card) return;
  card.querySelectorAll('.pipeline-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.pipeline-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const panel = document.getElementById(`panel-${leadId}-${tabId}`);
  if (panel) panel.classList.add('active');
}

// ─────────────────────────────────────────
// SOCIAL RATING
// ─────────────────────────────────────────
function setRating(leadId, platform, rating, btn) {
  const lead = getLead(leadId);
  if (!lead) return;
  if (!lead.socialRating) lead.socialRating = {};
  lead.socialRating[platform] = rating;
  updateLead(leadId, { socialRating: lead.socialRating });
  // Update UI
  const card = document.getElementById('lc-' + leadId);
  if (!card) return;
  const row = btn.closest('.social-platform');
  row.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function updateSocialUrl(leadId, platform, value) {
  updateLead(leadId, { [platform]: value });
}

function advanceToCall(id) {
  moveLead(id, 'cold_call');
  const card = document.getElementById('lc-' + id);
  if (card) {
    const tab = card.querySelector('.pipeline-tab:nth-child(2)');
    if (tab) tab.click();
  }
}

// ─────────────────────────────────────────
// PITCH GENERATION
// ─────────────────────────────────────────
function generatePitchPrompt(id) {
  const lead = getLead(id);
  if (!lead) return;
  const social = lead.socialRating || {};
  const ratings = ['instagram','tiktok','facebook','youtube']
    .filter(p => lead[p] || social[p])
    .map(p => `${p.charAt(0).toUpperCase()+p.slice(1)}: ${lead[p]||'not found'} (rated: ${social[p]||'unrated'})`)
    .join('\n');
  const prompt = `You are a cold call pitch writer for a social media videographer called Lewis who creates short-form video content (Reels, TikToks) for local businesses.

Write a confident, natural-sounding cold call pitch for the following business. The pitch should be conversational, last about 30-45 seconds when spoken, and end with a clear question to keep them on the line.

Business Details:
- Name: ${lead.name}
- Type: ${lead.type || 'not specified'}
- Location: ${lead.location || 'not specified'}
- Phone: ${lead.phone || 'not specified'}

Social Media:
${ratings || 'No social media info gathered yet'}

Notes: ${lead.notes || 'none'}

The pitch should:
1. Open with Lewis introducing himself
2. Mention he's noticed their social media specifically
3. Explain the opportunity (more customers, better content)
4. Be confident but not salesy
5. End with an open question

Write just the pitch script. No explanations.`;

  // Copy to clipboard
  navigator.clipboard?.writeText(prompt).then(() => {
    showToast('Prompt copied — paste into ChatGPT or Claude');
  }).catch(() => {
    // Fallback: show in a modal-style alert
    window.prompt('Copy this prompt and paste into ChatGPT:', prompt);
  });
}

function savePitch(id) {
  const pitch = document.getElementById('pitch-' + id)?.value || '';
  updateLead(id, { pitch });
  showToast('Pitch saved');
}

// ─────────────────────────────────────────
// CALL OVERLAY
// ─────────────────────────────────────────
let _callLeadId = null;
let _callObjections = [];

const OBJECTION_RESPONSES = {
  already_someone: `Not a problem at all — out of curiosity, do they also create the video content, or are they mainly managing your pages?\n\nIf they're just managing: "That's actually where I come in — I handle all the filming and editing. Plenty of my clients have a page manager and use me for the actual video content."\n\nIf they do both: "Totally understand. Can I ask — are you happy with the results? I only ask because short-form video is what I specialise in, and the results tend to be a bit different."`,
  no_budget: `Completely get it — that's where most people start. I work on a monthly retainer so it's a fixed, predictable cost rather than big one-off fees. Most clients see a return within the first month from new bookings alone.\n\nWould it be worth a quick chat just to see what the numbers look like? No commitment.`,
  not_interested: `No worries at all, I appreciate you being straight with me. Can I just ask — is it more that video content isn't something you see value in, or is it more the timing right now?\n\nIf timing: "Understood. Would it be alright if I sent you a quick message with some examples? No pressure — just so you've got it if things change."`,
  too_busy: `Totally understand — that's exactly why most of my clients come to me. You don't need to be involved much at all. I handle everything — filming, editing, posting. Most business owners spend about 30 minutes with me once a month.\n\nCould we find 10 minutes this week or next for a quick chat?`,
  call_back: `Of course — when's a good time? I'll put it in my diary now.\n\n[Note the callback time and make sure to follow up on the exact day and time agreed.]`,
  send_info: `Absolutely — what's the best email or number to send it to?\n\n[Send a brief intro with 2-3 examples of your best work, tailored to their niche. Follow up 48 hours later.]`,
};

function openCallOverlay(id) {
  const lead = getLead(id);
  if (!lead) return;
  _callLeadId = id;
  _callObjections = [];
  document.getElementById('callBizName').textContent = lead.name;
  document.getElementById('callBizMeta').textContent = [lead.type, lead.location].filter(Boolean).join(' · ');
  document.getElementById('callPitchText').textContent = lead.pitch || '(No pitch saved yet — go to Cold Call tab and generate one first.)';
  document.getElementById('objResponse').style.display = 'none';
  document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('callOverlay').classList.add('open');
}

function closeCallOverlay() {
  // Save call log if there was any activity
  if (_callLeadId) {
    // Just close — outcome buttons handle the save
  }
  document.getElementById('callOverlay').classList.remove('open');
  _callLeadId = null;
  _callObjections = [];
}

function showObjResponse(btn, key) {
  document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (!_callObjections.includes(key)) _callObjections.push(key);
  const el = document.getElementById('objResponse');
  el.textContent = OBJECTION_RESPONSES[key] || '';
  el.style.display = 'block';
}

function callOutcome(outcome) {
  if (!_callLeadId) return;
  const lead = getLead(_callLeadId);
  if (!lead) return;

  // Save call log entry
  const logs = lead.callLogs || [];
  logs.push({
    date: new Date().toISOString(),
    outcome,
    objections: _callObjections.map(k => k.replace(/_/g,' ')),
    notes: '',
  });

  if (outcome === 'shoot') {
    updateLead(_callLeadId, { callLogs: logs, stage: 'follow_up' });
    closeCallOverlay();
    renderLeads();
    openBookShoot(_callLeadId);
  } else if (outcome === 'follow_up') {
    updateLead(_callLeadId, { callLogs: logs, stage: 'follow_up' });
    closeCallOverlay();
    renderLeads();
    openFollowUp(_callLeadId, 'callback');
  } else if (outcome === 'lost') {
    updateLead(_callLeadId, { callLogs: logs, stage: 'lost' });
    closeCallOverlay();
    renderLeads();
    showToast('Lead marked as lost');
  } else if (outcome === 'try_later') {
    updateLead(_callLeadId, { callLogs: logs, stage: 'try_later' });
    closeCallOverlay();
    renderLeads();
    openFollowUp(_callLeadId, 'try_later');
  }
}

// ─────────────────────────────────────────
// BOOK SHOOT
// ─────────────────────────────────────────
let _bookShootLeadId = null;

function openBookShoot(id) {
  _bookShootLeadId = id;
  document.getElementById('bs-date').value = '';
  document.getElementById('bs-notes').value = '';
  openModal('bookShootModal');
}

function confirmBookShoot() {
  const date = document.getElementById('bs-date').value;
  const time = document.getElementById('bs-time').value;
  const notes = document.getElementById('bs-notes').value.trim();
  if (!date) { alert('Please pick a date.'); return; }
  const shootDate = date + (time ? ' ' + time : '');
  updateLead(_bookShootLeadId, { shootDate, stage: 'shoot_booked' });
  closeModal('bookShootModal');
  renderLeads();
  showToast('Shoot booked for ' + new Date(date).toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long'}));
}

// ─────────────────────────────────────────
// FOLLOW UP
// ─────────────────────────────────────────
let _followUpLeadId = null;

function openFollowUp(id, type) {
  _followUpLeadId = id;
  const lead = getLead(id);
  const modal = document.getElementById('followUpModal');
  const title = document.getElementById('fuModalTitle');
  const body = document.getElementById('fuModalBody');

  if (type === 'whatsapp') {
    title.textContent = 'WhatsApp Follow Up';
    body.innerHTML = `
      <div class="field"><label>Message</label>
        <textarea class="input" id="wa-msg" style="min-height:120px;">Hi ${esc(lead?.name||'')}, it's Lewis — the videographer who called earlier! I just wanted to follow up and send over a couple of examples of what I've been creating for similar businesses. Would love to show you what I could do for you 🙏</textarea>
      </div>
      <div style="display:flex;gap:.5rem;margin-bottom:.5rem;">
        <button class="btn btn-green" onclick="copyWaMessage()">Copy Message</button>
        ${lead?.phone ? `<a href="https://wa.me/${lead.phone.replace(/\D/g,'')}" target="_blank" class="btn">Open WhatsApp</a>` : ''}
      </div>
      <div class="field"><label>Schedule Follow Up Date</label><input class="input" id="fu-date" type="date"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveFollowUp()">Save</button>
        <button class="btn" onclick="closeModal('followUpModal')">Cancel</button>
      </div>`;
  } else if (type === 'callback') {
    title.textContent = 'Schedule Callback';
    body.innerHTML = `
      <div class="field"><label>Callback Date</label><input class="input" id="fu-date" type="date"></div>
      <div class="field"><label>Notes</label><textarea class="input" id="fu-notes" placeholder="What was agreed, what to mention..."></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveFollowUp()">Save Callback</button>
        <button class="btn" onclick="closeModal('followUpModal')">Cancel</button>
      </div>`;
  } else if (type === 'try_later') {
    title.textContent = 'Try Again Later';
    body.innerHTML = `
      <div class="field"><label>Re-book Date</label><input class="input" id="fu-date" type="date"></div>
      <div class="field"><label>Reason / Notes</label><textarea class="input" id="fu-notes" placeholder="Why are we waiting?"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveFollowUp()">Schedule</button>
        <button class="btn" onclick="closeModal('followUpModal')">Cancel</button>
      </div>`;
  }
  openModal('followUpModal');
}

function saveFollowUp() {
  const date = document.getElementById('fu-date')?.value;
  const notes = document.getElementById('fu-notes')?.value || '';
  if (date) updateLead(_followUpLeadId, { followUpDate: date, followUpNotes: notes });
  closeModal('followUpModal');
  renderLeads();
  if (date) showToast('Follow up scheduled for ' + new Date(date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}));
}

function copyWaMessage() {
  const msg = document.getElementById('wa-msg')?.value || '';
  navigator.clipboard?.writeText(msg).then(() => showToast('Message copied'));
}

// ─────────────────────────────────────────
// LEAD ACTIONS
// ─────────────────────────────────────────
function moveLead(id, stage) {
  updateLead(id, { stage });
  renderLeads();
  // Reopen card
  const card = document.getElementById('lc-' + id);
  if (card) card.classList.add('open');
}

function deleteLead(id) {
  if (!confirm('Delete this lead? This cannot be undone.')) return;
  const leads = getLeads().filter(l => l.id !== id);
  saveLeads(leads);
  renderLeads();
}

function editLead(id) {
  const lead = getLead(id);
  if (!lead) return;
  // Pre-fill modal
  document.getElementById('al-name').value = lead.name || '';
  document.getElementById('al-type').value = lead.type || '';
  document.getElementById('al-location').value = lead.location || '';
  document.getElementById('al-phone').value = lead.phone || '';
  document.getElementById('al-website').value = lead.website || '';
  document.getElementById('al-instagram').value = lead.instagram || '';
  document.getElementById('al-tiktok').value = lead.tiktok || '';
  document.getElementById('al-facebook').value = lead.facebook || '';
  document.getElementById('al-youtube').value = lead.youtube || '';
  document.getElementById('al-notes').value = lead.notes || '';
  // Override save to update instead
  const btn = document.querySelector('#addLeadModal .btn-primary');
  btn.textContent = 'Update Lead';
  btn.onclick = () => {
    const leads = getLeads();
    const i = leads.findIndex(l => l.id === id);
    if (i > -1) {
      leads[i] = { ...leads[i],
        name: document.getElementById('al-name').value.trim(),
        type: document.getElementById('al-type').value.trim(),
        location: document.getElementById('al-location').value.trim(),
        phone: document.getElementById('al-phone').value.trim(),
        website: document.getElementById('al-website').value.trim(),
        instagram: document.getElementById('al-instagram').value.trim(),
        tiktok: document.getElementById('al-tiktok').value.trim(),
        facebook: document.getElementById('al-facebook').value.trim(),
        youtube: document.getElementById('al-youtube').value.trim(),
        notes: document.getElementById('al-notes').value.trim(),
      };
      saveLeads(leads);
    }
    btn.textContent = 'Add Lead';
    btn.onclick = saveNewLead;
    closeModal('addLeadModal');
    renderLeads();
  };
  openModal('addLeadModal');
}

// ─────────────────────────────────────────
// GOOGLE MAPS SCANNER
// ─────────────────────────────────────────
let SCAN_RESULTS = [];
let _mapsLoaded = false;

function saveMapsKey(val) {
  localStorage.setItem('las_maps_key', val.trim());
}
function getMapsKey() {
  return localStorage.getItem('las_maps_key') || '';
}

window.addEventListener('load', () => {
  const key = getMapsKey();
  const input = document.getElementById('mapsKeyInput');
  if (input && key) input.value = key;
});

function loadMapsApi(key) {
  if (_mapsLoaded) return Promise.resolve();
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places`;
    s.onload = () => { _mapsLoaded = true; res(); };
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function runScanner() {
  const q = document.getElementById('scanQuery').value.trim();
  if (!q) return;
  const key = getMapsKey();
  const resultsEl = document.getElementById('scanResults');
  if (!key) {
    resultsEl.innerHTML = '<div class="scan-notice">Please enter your Google Maps API key above.</div>';
    return;
  }
  resultsEl.innerHTML = '<div class="scan-notice">Scanning...</div>';
  try {
    await loadMapsApi(key);
    const dummy = document.createElement('div');
    const svc = new google.maps.places.PlacesService(dummy);
    svc.textSearch({ query: q }, (results, status) => {
      if (status !== google.maps.places.PlacesServiceStatus.OK || !results?.length) {
        resultsEl.innerHTML = '<div class="scan-notice">No results found. Try a different search.</div>';
        return;
      }
      SCAN_RESULTS = results.slice(0, 10).map(r => ({
        name: r.name,
        type: (r.types||[]).filter(t => !['point_of_interest','establishment'].includes(t))[0]?.replace(/_/g,' ') || '',
        address: r.formatted_address || r.vicinity || '',
        rating: r.rating ? `${r.rating}★ (${r.user_ratings_total||0})` : '',
        placeId: r.place_id,
      }));
      resultsEl.innerHTML = SCAN_RESULTS.map((r, i) => `
        <div class="scan-result">
          <div class="scan-result-info">
            <div class="scan-result-name">${esc(r.name)}</div>
            <div class="scan-result-meta">${[r.type, r.address, r.rating].filter(Boolean).join(' · ')}</div>
          </div>
          <button class="btn btn-primary btn-sm" id="sbtn-${i}" onclick="addFromScan(${i},this)">+ Add</button>
        </div>`).join('');
    });
  } catch(e) {
    resultsEl.innerHTML = `<div class="scan-notice">Error: ${esc(e.message)}</div>`;
  }
}

function addFromScan(i, btn) {
  const r = SCAN_RESULTS[i];
  if (!r) return;
  const leads = getLeads();
  leads.unshift({
    id: uid(),
    name: r.name,
    type: r.type,
    location: r.address,
    phone: '', website: '', instagram: '', tiktok: '', facebook: '', youtube: '', notes: '',
    stage: 'research',
    socialRating: {}, pitch: '', callLogs: [], followUpDate: null, shootDate: null,
    addedAt: new Date().toISOString(),
  });
  saveLeads(leads);
  btn.textContent = '✓ Added';
  btn.disabled = true;
  renderLeads();
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a3a;border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;font-size:.78rem;font-weight:600;padding:.6rem 1.25rem;border-radius:99px;z-index:999;white-space:nowrap;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ─────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; return; }
  showApp();
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  buildNav();
  showSection('home');
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp();
});
</script>
